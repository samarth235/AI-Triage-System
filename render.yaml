services:
  - type: web
    name: ai-triage-system-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k gthread -w 1 --threads 2 --bind 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////tmp/triage.db
      - key: CORS_ORIGINS
        value: https://ai-triage-system-for-er.web.app,https://ai-triage-system-for-er.firebaseapp.com
